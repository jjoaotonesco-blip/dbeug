name: Android Debug APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Build debug APK
        run: gradle -p AskBarAndroid assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ask-bar-debug-apk
          path: AskBarAndroid/app/build/outputs/apk/debug/app-debug.apk

